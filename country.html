<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Country · Africa VNR Analysis 2026</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32.png">
<link rel="icon" type="image/png" sizes="512x512" href="assets/img/favicon-512.png">
<link rel="apple-touch-icon" href="assets/img/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/site.css">
</head>
<body>

<div class="accent-bar"></div>

<header class="site">
  <div class="wrap header-inner">
    <div class="brand">
      <a class="brand-mark" href="index.html">
        <img class="brand-logo" src="assets/img/osaa-logo.png" width="1000" height="190"
             alt="United Nations Office of the Special Adviser on Africa" data-i18n-alt="logo_alt">
      </a>
      <span class="brand-rule" aria-hidden="true"></span>
      <h1 data-i18n="site_title"></h1>
    </div>
    <nav class="header-nav">
      <a class="nav-btn" href="index.html" data-i18n="back_all"></a>
      <a class="nav-btn" href="methodology.html" data-i18n="nav_method"></a>
      <div class="toggle-group" role="group" aria-label="Language">
        <button data-lang="en">EN</button>
        <button data-lang="fr">FR</button>
      </div>
      <button class="icon-btn" data-theme-toggle aria-label="Toggle theme">☾</button>
    </nav>
  </div>
</header>

<div id="page">

  <section class="country-hero">
    <div class="wrap">
      <h2 id="c-name"></h2>
      <p class="country-tagline" id="c-tagline"></p>
      <div class="country-meta" id="c-meta"></div>

      <p class="provenance" data-i18n="prov_country"></p>

      <div class="sec-tabs" role="tablist">
        <button class="sec-tab" data-sec="factsheet" role="tab" data-i18n="tab_factsheet"></button>
        <button class="sec-tab" data-sec="dashboard" role="tab" data-i18n="tab_dashboard"></button>
        <!-- Shown only for countries that have an FAQ block. country.js hides it. -->
        <button class="sec-tab" data-sec="faq" role="tab" id="tab-faq" data-i18n="tab_faq" hidden></button>
      </div>
    </div>
  </section>

  <main>
    <div class="wrap">

      <!-- ── FACT SHEET ─────────────────────────────── -->
      <div data-sec-panel="factsheet" hidden>

        <!-- The lede. Countries carrying a `lede` block open on their finding
             instead of on the theme grid; the rest start at section 01. -->
        <div class="fs-lede reveal" id="fs-lede" hidden>
          <span class="eyebrow" data-i18n="fs_finding"></span>
          <p class="fs-statement" id="fs-statement"></p>
          <div class="fs-figs" id="fs-figs"></div>
        </div>

        <div class="section">
          <div class="section-head" style="display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;">
            <div>
              <span class="eyebrow">01</span>
              <h3 data-i18n="fs_themes"></h3>
            </div>
            <a class="nav-btn primary" id="fs-pdf" download data-i18n="fs_download"></a>
          </div>
          <div class="theme-grid" id="fs-themes"></div>
        </div>

        <div class="section">
          <div class="section-head">
            <span class="eyebrow">02</span>
            <h3 data-i18n="fs_continuity"></h3>
          </div>
          <div id="fs-continuity"></div>
        </div>

        <div class="section">
          <div class="section-head">
            <span class="eyebrow">03</span>
            <h3 data-i18n="fs_concepts"></h3>
            <p id="fs-concept-caption"></p>
            <p class="mono" style="font-size:11px;color:var(--ink-muted);margin-top:4px;" data-i18n="fs_concepts_note"></p>
          </div>
          <div class="card" id="fs-concepts"></div>
        </div>
      </div>

      <!-- ── DASHBOARD ──────────────────────────────── -->
      <div data-sec-panel="dashboard" hidden>

        <!-- Rich 7-tab dashboard. Used where the country has a `dashboard`
             block (Tanzania, Gabon). dash.js fills this. -->
        <div id="dash-host" class="section" style="margin-top:8px;"></div>

        <!-- Fallback for countries not yet rebuilt on the rich structure. -->
        <div id="dash-fallback" hidden>
          <div class="section" style="margin-top:8px;">
            <div class="section-head">
              <span class="eyebrow">01</span>
              <h3 data-i18n="db_indicators"></h3>
            </div>
            <div class="stat-grid" id="db-stats"></div>
          </div>

          <div class="section">
            <div class="section-head">
              <span class="eyebrow">02</span>
              <h3 data-i18n="db_charts"></h3>
            </div>
            <div id="db-charts" style="display:flex;flex-direction:column;gap:14px;"></div>
          </div>

          <div class="section">
            <div class="section-head">
              <span class="eyebrow">03</span>
              <h3 data-i18n="db_instruments"></h3>
            </div>
            <div class="inst-grid" id="db-instruments"></div>
          </div>
        </div>
      </div>

      <!-- ── FAQ ────────────────────────────────────── -->
      <!-- Present only where the country has a `faq` block (Gabon, Tanzania).
           faq.js fills this; country.js hides the tab otherwise. -->
      <div data-sec-panel="faq" hidden>
        <div id="faq-host" class="section" style="margin-top:8px;"></div>
      </div>

      <div class="section">
        <div class="disclaimer" data-i18n="disclaimer"></div>
      </div>

    </div>
  </main>
</div>

<footer class="site">
  <div class="wrap" data-i18n="footer"></div>
</footer>

<script src="assets/js/core.js"></script>
<script src="assets/js/manifest.js"></script>
<script src="assets/js/faq.js"></script>
<script src="assets/js/charts.js"></script>
<script src="assets/js/dash.js"></script>
<script src="assets/js/country.js"></script>
</body>
</html>
