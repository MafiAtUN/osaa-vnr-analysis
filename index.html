<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Africa VNR Analysis 2026 · OSAA</title>
<meta name="description" content="Fact-checked bilingual analysis of the 19 African Voluntary National Reviews presented at the 2026 High-Level Political Forum.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/site.css">
</head>
<body>

<div class="accent-bar"></div>

<header class="site">
  <div class="wrap header-inner">
    <div class="brand">
      <span class="eyebrow" data-i18n="site_sub"></span>
      <h1 data-i18n="site_title"></h1>
    </div>
    <nav class="header-nav">
      <a class="nav-btn" href="methodology.html" data-i18n="nav_method"></a>
      <div class="toggle-group" role="group" aria-label="Language">
        <button data-lang="en">EN</button>
        <button data-lang="fr">FR</button>
      </div>
      <button class="icon-btn" data-theme-toggle aria-label="Toggle theme">☾</button>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="wrap hero-inner">
    <div>
      <div class="eyebrow" data-i18n="hero_label"></div>
      <h2 data-i18n="hero_title" data-i18n-html></h2>
      <p data-i18n="hero_body"></p>
    </div>
    <div class="hero-stats">
      <div class="hero-stat">
        <div class="hero-stat-num" id="stat-countries">19</div>
        <div class="hero-stat-label" data-i18n="stat_countries"></div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-num" id="stat-checks">0</div>
        <div class="hero-stat-label" data-i18n="stat_checks"></div>
      </div>
    </div>
  </div>
</section>

<main>
  <div class="wrap">
    <div class="toolbar">
      <div class="filter-row">
        <span class="eyebrow" data-i18n="filter_region"></span>
        <span id="filters" class="filter-row"></span>
      </div>
      <div class="count-label" id="count"></div>
    </div>

    <div class="country-grid" id="grid"></div>

    <div class="section">
      <div class="disclaimer" data-i18n="disclaimer"></div>
    </div>
  </div>
</main>

<footer class="site">
  <div class="wrap" data-i18n="footer"></div>
</footer>

<script src="assets/js/core.js"></script>
<script src="assets/js/manifest.js"></script>
<script src="assets/js/charts.js"></script>
<script src="assets/js/home.js"></script>
</body>
</html>
